<div class="container mt-5">
  <div class="row">

    <div class="col-md-3">
      <div class="category-sidebar p-3 shadow-sm rounded-4 bg-white border">

        <div class="d-flex justify-content-between align-items-center mb-0 cursor-pointer"
             (click)="isCategoryCollapsed = !isCategoryCollapsed"
             style="cursor: pointer;">
          <h5 class="fw-bold m-0 text-navy">Categories</h5>
          <i class="bi" [ngClass]="isCategoryCollapsed ? 'bi-chevron-down' : 'bi-chevron-up'"></i>
        </div>

        <div [class.d-none]="isCategoryCollapsed" class="d-flex flex-column gap-2 mt-3 animate-fade-in">

          <button class="category-btn d-flex align-items-center"
                  [class.active]="selectedCategory === null"
                  (click)="loadAllProducts()">
            <i class="bi bi-grid-fill me-2"></i> All Products
          </button>

          <button *ngFor="let cat of categories"
                  class="category-btn"
                  [class.active]="selectedCategory === cat.categoryId"
                  (click)="loadByCategory(cat.categoryId)">
            {{ cat.categoryName }}
          </button>

        </div>
      </div>
    </div>

    <div class="col-md-9">
      <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0 border-start border-primary border-4 ps-3 text-navy">
          {{ selectedCategory ? 'Filtered Results' : 'Explore All Products' }}
        </h4>
        <div class="line flex-grow-1 ms-3 bg-light" style="height: 2px;"></div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4 col-md-6 col-sm-6" *ngFor="let product of products">
          <div class="card product-grid-card border-0 shadow-sm h-100">

            <div class="position-relative overflow-hidden">
              <button class="wishlist-btn shadow-sm" (click)="toggleWishlist(product.productId)">
                <i class="bi" [ngClass]="(favorites$ | async)?.includes(product.productId) ? 'bi-heart-fill text-danger' : 'bi-heart'"></i>
              </button>

              <img [src]="product.imageUrl || 'assets/no-image.png'"
                   class="card-img-top product-img p-3"
                   (click)="viewProduct(product.productId)"
                   style="cursor: pointer;">
            </div>

            <div class="card-body d-flex flex-column">
              <h6 class="product-title fw-bold">{{ product.name }}</h6>

              <div class="d-flex align-items-baseline mb-3">
                <span class="price text-navy fs-5 fw-bold">₹{{ product.price }}</span>
                <span class="mrp ms-2 text-muted text-decoration-line-through" *ngIf="product.mrp">
                  ₹{{ product.mrp }}
                </span>
              </div>

              <div class="mt-auto">
                <div class="d-flex gap-2">
                  <div class="quantity-box d-flex align-items-center bg-light rounded-pill px-2">
                    <button class="btn btn-sm border-0 qty-btn" (click)="decreaseQty(product.productId)">-</button>
                    <span class="qty-value px-2 fw-bold text-navy">
                        {{ quantityMap[product.productId] || 1 }}
                    </span>
                    <button class="btn btn-sm border-0 qty-btn" (click)="increaseQty(product.productId)">+</button>
                  </div>

                  <button class="btn btn-dark flex-grow-1 add-btn rounded-pill fw-bold" (click)="addToCart(product)">
                    <i class="bi bi-cart3 me-1"></i> Add
                  </button>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <div *ngIf="products.length === 0" class="text-center p-5 mt-5">
        <i class="bi bi-box-seam fs-1 text-muted"></i>
        <p class="mt-3 text-muted">No products found in this category.</p>
      </div>

    </div>
  </div>
</div>
