<div class="container mt-5 animate-fade-in">
  <div class="section-header d-flex justify-content-between align-items-center mb-5">
    <div class="d-flex align-items-center">
      <div class="header-icon-box bg-navy text-white me-3 rounded-3 d-flex align-items-center justify-content-center"
           style="width: 45px; height: 45px;">
        <i class="bi bi-heart-fill"></i>
      </div>
      <h3 class="fw-bold m-0 text-navy">
        My Wishlist <span class="text-muted fs-6 fw-normal ms-2">({{ favorites.length }} Items)</span>
      </h3>
    </div>
    <button *ngIf="favorites.length > 0"
            class="btn btn-outline-danger btn-sm rounded-pill px-3 shadow-sm"
            (click)="clearAllFavorites()">
      <i class="bi bi-trash3 me-1"></i> Clear All
    </button>
  </div>

  <div *ngIf="favorites.length === 0" class="text-center py-5 shadow-sm rounded-4 bg-white border">
    <div class="empty-icon-wrapper mb-4">
      <i class="bi bi-bag-heart text-light-blue" style="font-size: 5rem;"></i>
    </div>
    <h4 class="fw-bold text-navy">Your wishlist is empty</h4>
    <p class="text-muted mb-4">Save items you like to see them here.</p>
    <button class="btn btn-navy rounded-pill px-5 py-2 fw-bold" routerLink="/shop">
      Explore Products
    </button>
  </div>

  <div class="row g-4" *ngIf="favorites.length > 0">
    <div class="col-lg-3 col-md-4 col-sm-6" *ngFor="let item of favorites">
      <div class="card wishlist-card border-0 shadow-sm h-100">

        <button class="btn-remove shadow-sm" (click)="remove(item.productId)" title="Remove">
          <i class="bi bi-x"></i>
        </button>

        <div class="product-img-wrapper p-4 position-relative" (click)="viewProduct(item.productId)" style="cursor: pointer;">
          <img [src]="item.imageUrl ? item.imageUrl : 'assets/images/placeholder.png'"
               class="card-img-top product-img"
               [alt]="item.productName"
               onerror="this.src='https://placehold.co/300x300?text=Image+Not+Found'">

          <div class="view-overlay d-flex align-items-center justify-content-center">
            <span class="badge rounded-pill bg-white text-navy px-3 py-2 shadow-sm">View Details</span>
          </div>
        </div>

        <div class="card-body d-flex flex-column pt-0">
          <div class="mb-2">
             <span class="badge bg-light text-success border border-success-subtle fw-medium mb-2" style="font-size: 0.7rem;">
               <i class="bi bi-check2-circle me-1"></i>In Stock
             </span>
            <h6 class="product-title fw-bold text-navy mb-1 text-truncate-2">{{ item.productName }}</h6>
          </div>

          <div class="mt-auto pt-3">
            <div class="d-flex justify-content-between align-items-end mb-3">
              <span class="price text-primary fw-bolder fs-5">₹{{ item.price | number:'1.0-0' }}</span>
              <small class="text-muted" style="font-size: 0.75rem;">Excl. Taxes</small>
            </div>

            <button class="btn btn-navy w-100 rounded-3 fw-bold py-2 d-flex align-items-center justify-content-center gap-2"
                    (click)="addToCart(item.productId)">
              <i class="bi bi-cart-plus"></i>
              Move to Cart
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
