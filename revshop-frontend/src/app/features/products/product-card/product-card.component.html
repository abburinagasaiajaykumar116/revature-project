<div class="container mt-5" *ngIf="product">

  <div class="row">

   
    <div class="col-md-5">
      <img [src]="product.imageUrl"
           class="img-fluid rounded shadow w-100">
    </div>

    <div class="col-md-7">

      <h3>{{ product.name }}</h3>

      <h4 class="text-primary">₹{{ product.price }}</h4>

      <p>{{ product.description }}</p>

      <button class="btn p-0 mb-3"
              (click)="toggleWishlist()">

        <i class="bi fs-4"
          [ngClass]="(favorites$ | async)?.includes(product.productId)
    ? 'bi-heart-fill text-danger'
    : 'bi-heart'">
        </i>

      </button>

    
      <div class="my-3">
        <input type="number"
               [(ngModel)]="quantity"
               min="1"
               class="form-control w-25 d-inline">
      </div>

      <button class="btn btn-primary"
              (click)="addToCart()"
              [disabled]="isAddingToCart">

        <span *ngIf="!isAddingToCart">
          Add to Cart
        </span>

        <span *ngIf="isAddingToCart">
          <span class="spinner-border spinner-border-sm me-2"></span>
          Adding...
        </span>

      </button>

      <div *ngIf="cartSuccess" class="alert alert-success mt-3">
        {{ cartSuccess }}
      </div>

      <div *ngIf="cartError" class="alert alert-danger mt-3">
        {{ cartError }}
      </div>

    </div>
  </div>

  <hr class="my-5">

  <h4>Customer Reviews</h4>

  <div class="mb-3">

    <select [(ngModel)]="rating"
            class="form-select w-25">
      <option *ngFor="let r of [5,4,3,2,1]" [value]="r">
        {{ r }} Stars
      </option>
    </select>

    <textarea [(ngModel)]="comment"
              class="form-control mt-2"
              placeholder="Write your review">
    </textarea>

    <button class="btn btn-success mt-2"
            (click)="submitReview()">
      Submit Review
    </button>

  </div>

  <div *ngFor="let r of reviews"
       class="border p-3 mb-2 rounded">

    <strong>{{ r.userName }}</strong><br>
    ⭐ {{ r.rating }}<br>
    {{ r.comment }}

  </div>

</div>
