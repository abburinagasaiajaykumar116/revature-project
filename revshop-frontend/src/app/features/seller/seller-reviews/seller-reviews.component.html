
<div class="card shadow-sm border-0 rounded-3">
  <div class="card-header bg-white py-3 border-bottom-0">
    <h5 class="fw-bold text-navy mb-0">Product Reviews</h5>
  </div>

  <div class="card-body">
    <div *ngIf="reviews.length === 0" class="text-center py-4">
      <p class="text-muted">No reviews available yet.</p>
    </div>

    <div *ngFor="let review of reviews" class="mb-4 pb-3 border-bottom">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="fw-bold text-primary m-0">{{ review.productName }}</h6>
        <div class="text-warning small">
          <i class="bi bi-star-fill me-1" *ngFor="let s of [1,2,3,4,5].slice(0, review.rating)"></i>
        </div>
      </div>

      <p class="mb-1 text-dark fst-italic">"{{ review.comment }}"</p>

      <small class="text-muted">— Reviewed by <strong>{{ review.customerName }}</strong></small>
    </div>
  </div>
</div>
